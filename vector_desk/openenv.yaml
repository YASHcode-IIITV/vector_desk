name: VectorDesk
version: "1.0.0"
description: Memory-Augmented AI Office Benchmark with RAG and Vector DB
tasks:
  - id: email_triage
    description: Classify and reply to office emails
    action_space: [classify_email, reply_email, retrieve_context, complete_task]
    max_steps: 10
    reward_range: [-1.0, 1.0]
  - id: customer_support
    description: Resolve customer support tickets following company policies
    action_space: [resolve_ticket, escalate_ticket, ask_clarification, retrieve_context, complete_task]
    max_steps: 10
    reward_range: [-1.0, 1.0]
  - id: calendar_scheduling
    description: Schedule meetings and resolve calendar conflicts
    action_space: [schedule_meeting, reschedule_meeting, decline_meeting, retrieve_context, complete_task]
    max_steps: 10
    reward_range: [-1.0, 1.0]
vector_db:
  backend: faiss
  fallback: cosine_similarity
  embedding_model: all-MiniLM-L6-v2
  embedding_fallback: tfidf
